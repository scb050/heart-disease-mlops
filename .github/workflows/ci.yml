name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib scikit-learn jupyter ipykernel
          pip install fastapi uvicorn pydantic joblib evidently pytest flake8

      - name: Verificar sintaxis de app
        run: |
          python -m compileall app

      - name: Lint con flake8
        run: |
          flake8 app --max-line-length=100 --extend-ignore=E203,W503

      - name: Smoke test de la API
        run: |
          python -c "from app.api import app; print(app.title)"
