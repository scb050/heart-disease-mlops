apiVersion: apps/v1
kind: Deployment
metadata:
  name: heart-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: heart-model
  template:
    metadata:
      labels:
        app: heart-model
    spec:
      containers:
        - name: heart-model
          image: TU_USUARIO_DOCKER/heart-api:latest
          ports:
            - containerPort: 8000
